name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy and alias to el-astico.vercel.app
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          DEPLOY_URL=$(vercel deploy --prod --yes --token=$VERCEL_TOKEN)
          echo "Deployed to: $DEPLOY_URL"
          vercel alias set $DEPLOY_URL el-astico.vercel.app --token=$VERCEL_TOKEN
          echo "Aliased to: https://el-astico.vercel.app"
